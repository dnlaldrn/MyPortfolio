<section>
 
  <div class="flex  items-start justify-center mt-5">
          <div class="col-span-5 cols-start-1 mr-3"> <a routerLink="" class="flex justify-center"  ><img class="h-5 w-4" src="images/arrowback.svg"><p class="text-sm">Back</p></a></div>
    <div class="grid grid-cols-2 gap-2 lg:grid-cols-5 max-w-6xl">
      @for (item of slides; track item; let i = $index) {
        <a [href]="item.link" class="h-50 w-35 cols-start-2 hover:translate-y-1 duration-300 ease-in-out  gallery-img" [style.animation-delay.ms]="i * 50">
          <img [src]="item.img"  class="h-full w-full rounded-lg  " />
        </a>
      }
    </div>
  </div>
</section>
