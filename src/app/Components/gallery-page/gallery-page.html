<section>
 
  <div class="flex flex-col items-center justify-center mt-5">
          <div class="col-span-5 cols-start-1"> <a routerLink="" class="flex justify-center"><img src="images/arrowback.svg" >Back</a></div>
    <div class="grid grid-cols-2 gap-2 md:grid-cols-5 max-w-6xl">
      @for (item of slides; track item; let i = $index) {
        <div  class="h-50 w-35 cols-start-2 hover:translate-y-1 duration-300 ease-in-out ">
          <img [src]="item.img" [style.animation-delay.ms]="i * 70" class="h-full w-full rounded-lg gallery-img " />
        </div>
      }
    </div>
  </div>
</section>
