<section class="w-full overflow-hidden">
  <div class="flex justify-between items-center px-3">
    <p class="text-center mb-2 font-semibold">Watch My Journey</p>
    <a routerLink="/journey" class="flex justify-center items-center"
      ><p class="text-xs">View All</p>
    </a>
  </div>

  <div id="carousel">
    <div class="group">
      @for (item of slides; track item) {
        <a [href]="item.link">
          <img class="gallery-img" [src]="item.img" />
        </a>
      }

      @for (item of slides; track item) {
        <a [href]="item.link">
          <img class="gallery-img" [src]="item.img" />
        </a>
      }
    </div>
  </div>
</section>
