<section class="shadow-2xl border border-gray-400  rounded-lg p-3">
    <div class="flex justify-between items-center"><div class="flex justify-start items-center"><img [src]="theme.isDark()? '/images/Darkmode-Icons/certification.svg' : '/images/certificationlogo.svg'">Certifications</div><a routerLink="/certification" class="flex justify-center items-center"
      ><p class="text-xs">View All</p>
      <img class="h-4 w-4" src="/images/arrowforward.svg"
    /></a>
  </div>
  @for(item of certItems; track item){
     <div [class]="theme.isDark()? 'border border-white w-fit rounded-sm flex items-end justify-center mt-2 p-1 hover:translate-y-1 duration-300 ease-in-out' 
    : 'border border-black w-fit rounded-sm flex items-end justify-center mt-2 p-1 hover:translate-y-1 duration-300 ease-in-out' ">{{item}}</div>

  }
   
</section>
