<section class="max-w-full max-h-full shadow-2xl border border-gray-400 rounded-lg p-3 ">
  <div class="flex">
    <img [src]="theme.isDark() ? 'images/Darkmode-Icons/experience.svg' : 'images/aboutlogo.svg'" />
    <p>Education & Experience</p>
  </div>

  <div class="relative border-l border-gray-300 dark:border-gray-700">
    <div class="mt-2 flex justify-between items-center">
      <span
        class="absolute -left-1.5 flex items-center justify-center w-3 h-3 bg-black rounded-full"
        [class]="theme.isDark() ? 'bg-yellow-300' : 'bg-black'"
      ></span>
      <h1 class="ml-5">Front-End Developer</h1>
    </div>
    <div class="flex justify-between items-center ml-5">
      <p class="text-sm">PromdiFarm</p>
      <p class="border rounded-md px-2 text-xs">2025 - <span class="italic">Present</span></p>
    </div>

    <div class="mt-2 flex justify-between items-center">
      <span
        class="absolute -left-1.5 flex items-center justify-center w-3 h-3 bg-white border rounded-full"
        [class]="theme.isDark() ? 'hover:bg-yellow-300' : 'hover:bg-black'"
      ></span>
      <h1 class="ml-5">BS-Computer Science</h1>
    </div>
    <div class="flex justify-between items-center ml-5">
      <p class="text-sm">Batangas State University - TNEU</p>
      <p class="border rounded-md px-2 text-xs">2024</p>
    </div>

    <div class="mt-2 flex justify-between items-center">
      <span
        class="absolute -left-1.5 flex items-center justify-center w-3 h-3 bg-white border rounded-full"
        [class]="theme.isDark() ? 'hover:bg-yellow-300' : 'hover:bg-black'"
      ></span>
      <h1 class="ml-5">Wrote my first code</h1>
    </div>
    <div class="flex justify-between items-center ml-5">
      <p class="text-sm">At Home</p>
      <p class="border rounded-md px-2 text-xs">2024</p>
    </div>
  </div>
</section>
